apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  labels:
    app: multi-demo
spec:
  containers:

  - name: nginx
    image: nginx:1.14.2
    ports:
      - containerPort: 80

  - name: sidecar
    image: busybox
    command: ["sh", "-c", "while true; do echo Sidecar running; sleep 5; done"]
